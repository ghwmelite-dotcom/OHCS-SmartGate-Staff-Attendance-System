name = "ohcs-smartgate-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Keep the *.workers.dev subdomain (the SPA calls it for the rest of the API).
workers_dev = true

# Serve the public badge page from the branded custom domain, AND route the whole
# API first-party on both app domains so the session cookie is first-party (not a
# blocked third-party cookie). Worker routes take precedence over Pages for matching
# paths: /badge/* + /api/* hit the Worker; every other path stays on each app's Pages SPA.
routes = [
  { pattern = "smartgate.ohcsghana.org/badge/*", zone_name = "ohcsghana.org" },
  { pattern = "smartgate.ohcsghana.org/api/*", zone_name = "ohcsghana.org" },
  { pattern = "staff-attendance.ohcsghana.org/api/*", zone_name = "ohcsghana.org" },
]

rules = [
  { type = "Text", globs = ["**/*.sql"], fallthrough = true },
]

# Attendance summaries — Ghana time (UTC+0)
# Clock reminder: every 15 min 7-9 Mon-Fri (self-gates on admin-configurable late threshold)
# Daily summary: 9 AM Mon-Fri | Weekly: 4 PM Friday | Monthly: 9 AM 1st | Yearly: 9 AM Jan 1
# NSS end-of-service: 00:30 daily — auto-deactivate ended postings, alert on next 7 days
# Checkout sweep: 17:15 Mon-Fri — flag visitors still marked in building after close
# SLA escalation: every 15 min 8-17 Mon-Fri — escalate visitors waiting 30+ min with no host response
# Maintenance: 02:00 daily — purge expired visitor ID/face photos (+ backup, later)
[triggers]
crons = ["*/15 7-9 * * 1-5", "0 9 * * 1-5", "0 16 * * 5", "0 9 1 * *", "0 9 1 1 *", "30 0 * * *", "15 17 * * 1-5", "*/15 8-17 * * 1-5", "0 2 * * *"]

[vars]
ENVIRONMENT = "production"
VAPID_SUBJECT = "mailto:ops@ohcs.gov.gh"
TELEGRAM_BOT_USERNAME = "ohcs_smartgate_bot"
# Welcome-email config. RESEND_API_KEY is a Worker SECRET (set via dashboard/CLI),
# not here. EMAIL_FROM must be a Resend-verified sender on a verified domain.
EMAIL_FROM = "OHCS SmartGate <no-reply@ohcsghana.org>"
STAFF_APP_URL = "https://staff-attendance.ohcsghana.org"
ADMIN_APP_URL = "https://smartgate.ohcsghana.org"
# Dev/staging only — accept any webauthn_assertion at clock-in for testing.
# The Worker refuses requests in production when this is "true".
DEV_BYPASS_REAUTH = "false"

[[d1_databases]]
binding = "DB"
database_name = "smartgate-db"
database_id = "051e7d97-6909-426b-9574-331edf1ef351"

[[kv_namespaces]]
binding = "KV"
id = "95f4d6f18edf49e089234c5b7b462ccd"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "smartgate-storage"

[ai]
binding = "AI"

# Local development overrides
[env.dev]
[env.dev.vars]
ENVIRONMENT = "development"
VAPID_SUBJECT = "mailto:ops@ohcs.gov.gh"
TELEGRAM_BOT_USERNAME = "ohcs_smartgate_bot"
EMAIL_FROM = "OHCS SmartGate <no-reply@ohcsghana.org>"
STAFF_APP_URL = "https://staff-attendance.ohcsghana.org"
ADMIN_APP_URL = "https://smartgate.ohcsghana.org"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "smartgate-db"
database_id = "051e7d97-6909-426b-9574-331edf1ef351"

[[env.dev.kv_namespaces]]
binding = "KV"
id = "95f4d6f18edf49e089234c5b7b462ccd"

[[env.dev.r2_buckets]]
binding = "STORAGE"
bucket_name = "smartgate-storage"

[env.dev.ai]
binding = "AI"
